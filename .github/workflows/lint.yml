name: Lua Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get install -y lua5.4

      - name: Check Lua syntax
        run: find . -name "*.lua" -not -path "./_custom/*" -exec luac5.4 -p {} \; -print
